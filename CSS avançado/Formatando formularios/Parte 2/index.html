<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout fixo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <fieldset>
        <legend><img src="../../imagens/arquivos-necessarios-estilizando-formularios-parte2/arquivos-necessarios-estilizando-formularios-parte2/perfil.png" alt=""></legend>
        <div>
            <label for="email"><img src="../../imagens/arquivos-necessarios-estilizando-formularios-parte2/arquivos-necessarios-estilizando-formularios-parte2/icone-usuario.png" alt=""></label>
            <input type="email" name="email" id="email" placeholder="Digite seu email">
        </div>
        <div>
            <label for="senha"><img src="../../imagens/arquivos-necessarios-estilizando-formularios-parte2/arquivos-necessarios-estilizando-formularios-parte2/icone-cadeado.png" alt=""></label>
            <input type="senha" name="senha" id="senha" placeholder="Digite sua senha">
        </div>
        <input type="submit" name="button" value="Logar">
    </fieldset>
</body>
</html>

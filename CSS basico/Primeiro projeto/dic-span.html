<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>div e span</title>
    <style>
        header{
            background-color: blue;
        }
        main{
            background-color: red;
        }
        footer{
            background-color: green;
        }
        #assinatura{
            background-color: pink;
        }
        .produtos{
            background-color: gray;
            margin: 10px;
        }
        .azul{
            background-color: blue;
        }
        img{
            width: 500px;
        }
    </style>
</head>
<body>
    <header>
        <img src="imagens/amazon-logo-home.webp" alt="Logo amazon">
        <nav>
            <ul>
                <li>Home</li>
                <li>Produtos</li>
                <li>Contato</li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="produtos">Produto 1</div>
        <div class="produtos">Produto 2</div>
        <div class="produtos">Profuto 3</div>
    </main>
    <footer>
        <p>Todos os <span class="azul">direitos</span> reservados</p>
    </footer>
    <span id="assinatura">Luiz</span>
    <span> Vital</span>
</body>
</html>

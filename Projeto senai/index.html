<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eletro Info</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="pt-3 pb-3">
        <nav id="menu">
            <div class="mobile-menu">
                <a href="/">
                    <div class="line-1"></div>
                    <div class="line-2"></div>
                    <div class="line-3"></div>
                </a>
            </div>
        </nav>
        <div id="logo">
            <img src="imagens/fullsize_2011_04_29_12_WDL-Logo-e-Papelaria-3563_12470_035814425_788084025-removebg-preview 1.png" alt="Logo da empresa">
        </div>
        <div class="w-100" id="busca">
            <img style="width: 25px; height: 25px;" src="imagens/1485477207-magnifier_78608-removebg-preview 1.png" alt="">
            <input type="text" name="busca" id="busca" placeholder="Buscar">
        </div>
        <div id="perfil">
            <a href="#"><img src="imagens/images-removebg-preview 1.png" alt=""></a>
        </div>
    </header>
    <main>
        <div id="parte1">
            <div id="banner">
                <div>
                    <h3>Loja especializada em informática</h3>
                </div>
            </div>
            <div id="titulo">
                <h1>Notebook Intel</h1>
            </div>
            <div id="informacoes">
                <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Pellentesque at ullamcorper leo. Praesent quis nisl dui. Cras tempus, augue pharetra ligula.</p>
            </div>
            <div id="botoes" class="mb-4">
                <button type="button" class="btn" id="btn-comprar"><img src="imagens/pngtree-shopping-cart-line-icon-vector-png-image_5058494-removebg-preview 1.png" alt="carrinho"> Comprar</button>
                <button type="button" class="btn" id="btn-ofertas">Ver ofertas</button>
            </div>
            <div id="imagemintel">
                <img src="imagens/joshuaworoniecki-laptop-5673901 1.png" alt="Notebook Intel">
            </div>
        </div>
        <div id="parte2">
            <div id="categorias" class="subtitulo">
                <h2>Categorias</h2>
            </div>
            <div id="opcoes">
                <div id="op1">
                    <div id="imagem-op1">
                        <img src="imagens/tela-do-monitor 1.png" alt="notebook">
                    </div>
                    <div id="texto-op1">
                        <h3>Notebooks</h3>
                        <p>Intel - SSD - Alta Performace</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="index.js"></script>

</html>

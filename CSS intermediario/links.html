<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatando links</title>
    <style>
        a{
            text-decoration: none;
        }
        a:link{
            color: #b9c941;
        }
        a:visited{
            color: red;
        }
        a:hover{
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <a href="https://www.google.com/?hl=pt_BR" target="_blank">Google</a> |
    <a href="https://www.tecmundo.com.br" target="_blank">Tec Mundo</a> |
    <a href="https://www.megacurioso.com.br" target="_blank">Mega Curioso</a>
</body>
</html>

<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap fundamentos</title>
    <link href="../bootstrap-5.3.8-dist/css/bootstrap.min.css" rel="stylesheet">
  
    </head>
  <body>


    <div class="container p-2" style="border: 3px solid red;">

        <!-- classes de largura -->
      <div class="bg-primary w-25">width 25%</div>
      <div class="bg-primary w-50">width 50%</div>
      <div class="bg-primary w-75">width 75%</div>
      <div class="bg-primary w-100">width 100%</div>
      <div class="bg-warning w-auto">width auto</div>

      <br>
      <br>

      <!-- classes de altura -->
      <div style="height: 300px;border: 1px solid gray;">
          <div class="bg-warning d-inline-block h-25 m-0" style="width: 20%;">height 25%</div>
          <div class="bg-warning d-inline-block h-50 p-0" style="width: 20%;">height 50%</div>
          <div class="bg-warning d-inline-block h-75 p-0" style="width: 20%;">height 75%</div>
          <div class="bg-warning d-inline-block h-100 p-0" style="width: 20%;">height 100%</div>
          <div class="bg-success d-inline-block h-auto p-0" style="width: 20%;">height auto</div>
      </div>

      <br>
      <br>

      <!-- Bordas
      border        -> todas as bordas
      border-top    -> borda superior
      border-bottom -> borda inferior
      border-end  -> bordar fim/direita
      border-start   -> borda início/esquerda

      Cores de bordas
      border-<cor>: primary, secondary, success, 
          info, warning, danger, light, dark, white
      -->
      <div class="bg-white mb-2 border border-warning">todas as bordas</div>
      <div class="bg-white mb-2 border-top">borda superior</div>
      <div class="bg-white mb-2 border-bottom">borda inferior</div>
      <div class="bg-white mb-2 border-end">borda direita</div>
      <div class="bg-white mb-2 border border-primary">borda esquerda</div>

      <br>
      <br>

      <!-- Border Radius 
      opções: rounded, rounded-top, rounded-start, 
              rounded-end, rounded-circle
      -->
      <div class="bg-light mb-2 p-1 border rounded">rounded</div>
      <div class="bg-light mb-2 p-1 border rounded-top">rounded top</div>
      <div class="bg-light mb-2 p-1 border rounded-bottom">rounded bottom</div>
      <div class="bg-light mb-2 p-1 border rounded-start">rounded início/esquerda</div>
      <div class="bg-light mb-2 p-1 border rounded-end">rounded fim/direita</div>
      <div class="bg-light text-center mb-2 py-5 border w-25 rounded-circle">rounded circle</div>

      <br>
      <br>

    </div>


    <script src="../bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>

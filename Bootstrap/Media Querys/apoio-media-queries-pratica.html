<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap breakpoints</title>

    <style type="text/css">

      /**************************/
        /* Extra small devices */
        @media screen and (max-width: 575px){
          body{
            background: aqua;
          }
        }
        
        /*Small devices*/
        @media screen and (min-width: 576px){
          body{
            background-color:blue;
          }
        }

        /*Medium devices (tablets, 768px e superior)*/
        @media screen and (min-width: 768px) {
          body{
            background-color: red;
          }
        }

        /*Large devices (desktops, 992px e superior)*/
        @media screen and (min-width: 992px) {
          body{
            background-color: violet;
          }
        }

        /*Extra large devices (large desktops, 1200px e superior)*/
        @media screen and (min-width: 1200px) {
          body{
            background-color: purple;
          }
        }

    </style>

  </head>

<body>

  <h1>Conteúdo</h1>
  <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Repellendus perspiciatis quidem enim voluptatem architecto? Non molestias optio asperiores delectus, sunt mollitia pariatur minima eos animi distinctio harum vero enim cupiditate.</p>
    
</body>
</html>

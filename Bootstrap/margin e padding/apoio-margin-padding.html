<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap fundamentos</title>
    <link href="../bootstrap-5.3.8-dist/css/bootstrap.min.css" rel="stylesheet">
  
    </head>
  <body>


    <!-- Aplicação de Margin
    mt -> Margin top
    mb -> Margin bottom
    ms -> Margin start (início / esquerda)
    me -> Margin end (final / direita)
    mx -> Margin no eixo x (horizontal) esquerda/direita
    my -> Margin no eixo y (vertical) top/bottom
    m  -> Margin em todos os lados
    Valor a definir (0 até 5)
    -->
    <h1 class="bg-success mx-5">Margin</h1>
    <p class="bg-warning">Conteúdo principal</p>
    <h1 class="bg-danger">Margin</h1>

    <br>
    <br>

    <!-- Aplicação de Padding
    pt -> Padding top
    pb -> Padding bottom
    ps -> Padding start (Início / esquerda)
    pe -> Padding end (Fim / direita)
    px -> Padding no eixo x (horizontal) esquerda/direita
    py -> Padding no eixo y (vertical) top/bottom
    p  -> Padding em todos os lados
    Valor a definir (0 até 5)
    -->
    <h1 class="bg-success p-5">Padding</h1>
    <p class="bg-success">Conteúdo principal</p>
    <h1 class="bg-success">Padding</h1>

    <br>
    <br>


    <script src="../bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
